# markdownlint config for Super-Linter.
# The pack's docs use dense symptom‚Üícause‚Üífix tables and long prose lines by
# design (a markdown table row can't be wrapped), and some fenced blocks are
# plain-text copy-paste prompts rather than code. Keep every other rule on.
default: true
MD013: false # line-length ‚Äî long table rows / prose lines are intentional
MD040: false # fenced-code-language ‚Äî the AI-prompt blocks are plain text
MD028: false # no-blanks-blockquote ‚Äî blank lines between blockquotes are fine
# The "blank line around a block" family ‚Äî noise for dense hand-written docs, and
# the repo's existing docs already vary here. Keep content over whitespace nits.
MD022: false # blanks-around-headings
MD031: false # blanks-around-fences
MD032: false # blanks-around-lists
