# This workflow executes several linters on changed files based on languages used in your code base whenever
# you push a code or open a pull request.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/github/super-linter
name: Lint Code Base

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full git history is needed to get a proper list of changed files within `super-linter`
          fetch-depth: 0

      - name: Lint Code Base
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo markdownlint config (relaxes MD013/MD040/MD028 for dense docs).
          MARKDOWN_CONFIG_FILE: .markdown-lint.yml
          # Turn off the two noise-only linters for this docs+scripts repo:
          #  - natural-language (textlint) pedantically rewrites "repo" → "repository"
          #  - jscpd copy-paste detection flags unavoidable boilerplate similarity
          # Kept on: gitleaks (secrets), eslint (JS), YAML/actionlint, bash, JSON.
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_JSCPD: false
